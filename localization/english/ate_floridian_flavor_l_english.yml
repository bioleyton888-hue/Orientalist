l_english:

 # ate_floridian.0001 — A Swamp Hatchling
 ate_floridian.0001.t:0 "A Swamp Hatchling"
 ate_floridian.0001.desc:0 "One of your hunters has returned from the wetlands with a most unusual gift: an alligator hatchling, no longer than your arm, its scales still bearing the soft sheen of youth.\n\nIt watches you with unblinking amber eyes. Your people have always lived alongside these animals — the swamps belong to them as much as to anyone. Perhaps it is time you let one into your court."
 ate_floridian.0001.a:0 "I will take the creature in."
 ate_floridian.0001.b:0 "Return it to the marsh."

 # ate_floridian.0002 — Name your alligator
 ate_floridian.0002.t:0 "What Shall We Call It?"
 ate_floridian.0002.desc:0 "The hatchling has made itself at home beneath your seat of power. It has already snapped at two servants and dragged a boot into the corner. It will need a name."
 ate_floridian.0002.a:0 "That is its name."

 # ate_floridian.0003 — The alligator settles in
 ate_floridian.0003.t:0 "Your Faithful Alligator"
 ate_floridian.0003.desc:0 "[ROOT.Char.GetLocalizedText( 'ate_gator_name' )] has grown well under your care. It follows you through the halls with a slow, easy swagger that makes servants press themselves against the walls. Your enemies have begun to hear stories. A ruler who keeps an alligator at heel is one who does not need to threaten twice."
 ate_floridian.0003.a:0 "Good [ROOT.Char.GetLocalizedText( 'ate_gator_name' )]."

 # alligator name options
 ate_gator_name_wally:0 "Wally"
 ate_gator_name_ali:0 "Ali"
 ate_gator_name_waylon:0 "Waylon"
 ate_gator_name_snapper:0 "Snapper"

 # Modifier
 ate_pet_alligator_modifier:0 "Pet Alligator"
 ate_pet_alligator_modifier_desc:0 "A Floridian alligator prowls your court. Its presence unsettles visitors and sharpens your reputation for danger."

 # ate_floridian.0004 — Bring the gator to council?
 ate_floridian.0004.t:0 "Council with the Gator"
 ate_floridian.0004.desc:0 "The council meeting is set for this morning. [ROOT.Char.GetLocalizedText( 'ate_gator_name' )] has been watching the door since dawn with that flat, patient stare of theirs."
 ate_floridian.0004.a:0 "Bring [ROOT.Char.GetLocalizedText( 'ate_gator_name' )] in."
 ate_floridian.0004.a_success:0 "The council is... persuaded."
 ate_floridian.0004.a_success.tt:0 "[ROOT.Char.GetLocalizedText( 'ate_gator_name' )] makes an impression on the least loyal councillor."
 ate_floridian.0004.a_failure:0 "Things take a turn."
 ate_floridian.0004.a_failure.tt:0 "[ROOT.Char.GetLocalizedText( 'ate_gator_name' )] bites the least loyal councillor."
 ate_floridian.0004.b:0 "Leave [ROOT.Char.GetLocalizedText( 'ate_gator_name' )] in the courtyard."
 ate_floridian.0004.b_play:0 "A pleasant surprise."
 ate_floridian.0004.b_play.tt:0 "[ROOT.Char.GetLocalizedText( 'ate_gator_name' )] finds some children to play with."
 ate_floridian.0004.b_eat:0 "Something goes wrong."
 ate_floridian.0004.b_eat.tt:0 "[ROOT.Char.GetLocalizedText( 'ate_gator_name' )] eats a servant."

 # ate_floridian.0005 — Gator intimidates the least-loyal councillor
 ate_floridian.0005.desc:0 "[ROOT.Char.GetLocalizedText( 'ate_gator_name' )] crossed the chamber and stopped directly in front of [scope:councillor.GetFirstNameNoTooltip]. The councillor has not spoken since. They will think twice before obstructing you again."
 ate_floridian.0005.a:0 "Good council."

 # ate_floridian.0006 — Gator bites the least-loyal councillor
 ate_floridian.0006.desc:0 "It happened before anyone could react. [scope:councillor.GetFirstNameNoTooltip] lunged for the door; [ROOT.Char.GetLocalizedText( 'ate_gator_name' )] caught them by the arm. The screaming was brief. The blood was not."
 ate_floridian.0006.a:0 "Someone fetch a physician."

 # ate_floridian.0007 — Gator plays with a courtier's children
 ate_floridian.0007.desc:0 "You return from the meeting to find [scope:lucky_courtier.GetFirstNameNoTooltip]'s children sprawled in the courtyard with [ROOT.Char.GetLocalizedText( 'ate_gator_name' )]. The youngest one is using the gator's back as a seat. [scope:lucky_courtier.GetFirstNameNoTooltip] looks equal parts horrified and oddly moved."
 ate_floridian.0007.a:0 "Florida children."

 # ate_floridian.0008 — Gator eats a servant
 ate_floridian.0008.desc:0 "A stable hand went into the south wing. He did not come out. [ROOT.Char.GetLocalizedText( 'ate_gator_name' )] did, eventually, looking satisfied. Your councillors have heard. They are not pleased."
 ate_floridian.0008.a:0 "Well."

 # Bite modifier
 ate_gator_bite_modifier:0 "Bitten by an Alligator"
 ate_gator_bite_modifier_desc:0 "A reminder to stand further from the throne."