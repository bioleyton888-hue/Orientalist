l_english:
 ate_florida_formables.0001.t:0 "The Lone Star Rises Again"
 ate_florida_formables.0001.desc:0 "For longer than the oldest charts remember, these gulf shores wore borrowed names — a panhandle of this kingdom, a marchland of that one, scraps parceled out among the strong. Yet the elders never forgot the tale of a realm that once flew a single white star upon a field of blue, a land that ran unbroken from the Pearl to the Perdido and bent its knee to no distant crown.\n\nToday the tale ends and the proclamation begins. From the ramparts above the bay to the bells of every gulf town, the old banner climbs the staff once more. #high [GetTitleByKey('k_west_florida').GetName]#! is reborn — and its crown rests upon your brow."
 ate_florida_formables.0001.a:0 "Let the lone star fly over us all!"
 ate_florida_formables.0001.b:0 "From the Pearl to the Perdido — ours, and free."

 # --- Assert Gulf Independence: the Empire of the Gulf / al-Hijrah ---
 ate_florida_formables.0010.t.secular:0 "An Empire Across the Gulf"
 ate_florida_formables.0010.t.shriner:0 "Al-Hijrah — The Migration Made Manifest"
 ate_florida_formables.0010.desc.secular:0 "They said the coastal South was no land at all — only the soft underbelly of greater powers, a shore to be carved up and quarreled over by kings who had never tasted its salt air. Let them say it now.\n\nFrom the bayous of the delta to the reefs of the keys, a single dominion answers to one throne — yours. The crowns of old are paraded through the streets, the rival lords made to kneel, and upon your brow is set the diadem of #high [GetTitleByKey('e_gulf_empire').GetName]#!. The Gulf has found its master, and its master is no one's vassal."
 ate_florida_formables.0010.desc.shriner:0 "The elders spoke of a hijra — a sacred migration out of bondage and into a promised shore — and the doubters laughed, for what promised land lies in a drowned and broken country? Today the laughter dies in their throats.\n\nThe faithful are gathered from every gulf town beneath one banner; the green standard climbs above the throne-hall, and the call to prayer rolls out across the water from the delta to the keys. Upon your brow is set the crown of #high [GetTitleByKey('e_gulf_empire').GetName]#! — and where there was exile, there is now an empire. The migration is complete. The promise is kept."
 ate_florida_formables.0010.a:0 "The Gulf answers to its own crown now."
 ate_florida_formables.0010.b:0 "Let every shore from the bayou to the keys know our name."

 # --- Scramble for the Sunshine State: three great powers, three claims ---
 ate_florida_formables.0020.t:0 "The Sunshine State Claimed"
 ate_florida_formables.0020.desc.usa:0 "The old maps are unrolled across the war-table, their ink faded but their borders defiant: one union from sea to shining sea, and Florida among its stars. For generations that union was a rumor — a flag folded in a footlocker, a promise muttered over campfires. No longer.\n\nThe peninsula is gathered back into the fold. Its squabbling little kingdoms are struck from the record, its counties readmitted under one federal crown, and the old banner climbs every staff from the panhandle to the keys. The Union remembers its own — and the Sunshine State has come home."
 ate_florida_formables.0020.desc.hcc:0 "For generations the Sunshine State was the Confederation's unfinished sermon — the one shore that would not be saved. Crusade after crusade marched south into the heat and the swamp; army after army broke upon that stubborn peninsula and limped home with nothing but fever and a tattered scripture. Florida was the prize that always slipped the faithful's grasp, mocking every preacher who swore it would be the last campaign.\n\nNo longer. What a hundred years of holy war could not seize, you have finally brought beneath the one true banner. The rival crowns lie shattered upon the altar steps; the peninsula is made one consecrated province of the godly union; and from the tabernacles of the north to the chapels of the keys the bells ring out a victory the Confederation had all but stopped praying for. The unfinished sermon is finished at last."
 ate_florida_formables.0020.desc.caribbean:0 "The sea has always been the highway of empire, and now its northern shore answers to the islands. Florida — the peninsula that guards every approach to the Gulf — is drawn at last into the Caribbean dominion: its harbors made tributary, its little kingdoms dissolved like salt in the tide.\n\nFrom the trade-houses of the keys to the wharves of the gulf coast, every dock now flies the colors of the island throne. The petty crowns of the mainland are swept into the surf, and the Sunshine State takes its place as the brightest jewel set in your maritime crown."
 ate_florida_formables.0020.a:0 "Florida is one realm now — and it is mine."
 ate_florida_formables.0020.b:0 "Strike the old kingdoms from every map."

 # --- Annex West Florida: mirror of Assert Gulf Independence, three annexers ---
 ate_florida_formables.0030.t:0 "West Florida, Reclaimed"
 ate_florida_formables.0030.desc.caribbean:0 "West Florida was born beneath the island throne's sphere the moment its lone star was raised again, and everyone at court knew it for what it was: a courtesy, not a settlement. The vassal who wore its crown ruled at the sea's pleasure, and the sea has decided it is done pretending otherwise.\n\nThe fleets that already patrol its coast now anchor in its harbors as of right, not as guests. The petty crown is folded quietly into the greater one, and not a sword need be drawn — the island throne collects what was always its own."
 ate_florida_formables.0030.desc.hcc:0 "West Florida was never meant to stand outside the one true banner for long — it was always the Confederation's unfinished sermon in miniature, a shore that slipped the faithful's grasp and was left to fend for itself under a borrowed crown.\n\nNo longer. The vassal-king's crown is set aside, its little court folded into the greater congregation, and the bells that ring from the tabernacles of the north now ring here too. Another failed crusade target is finally brought beneath the banner — quietly, but no less completely for it."
 ate_florida_formables.0030.desc.mississippi:0 "This was never annexation — the elders who remember the old charts know it plainly. West Florida's parishes were carved whole from the body of Louisiana and Magnolia, its coast severed from Alabama, its panhandle sawn from Norflo, all to dress a borrowed crown in stolen cloth. For a generation the wound was left open, the land answering to a kingdom that had no right to it.\n\nToday the wound closes. Every parish and county returns to the kingdom it was cut from — not conquered, not claimed, simply returned. The lone star is struck from the staff, and the land remembers whose it always was. This is not annexation. This is a homecoming."
 ate_florida_formables.0030.t.gulf:0 "Stalingrad Railway Station Extravaganza"
 ate_florida_formables.0030.desc.gulf:0 "The court chroniclers have stopped binding the West Florida page into the imperial annals — they keep it loose now, so it can be rewritten. And why not? This kingdom was the cradle of the empire itself, the crown your line wore before there was an empire to wear it in. Then it slipped away. Then it was won back. Then — if the older scribes are to be believed — lost and won once or twice more, by which point even they had given up carving the changes into anything more permanent than wax.\n\nToday the lone star comes down from the staff once again, and the imperial banner rises in its place — again. The garrison cheers with the practiced enthusiasm of men who have cheered this exact moment before, and who fully expect to cheer it at least once more before they die. No matter. West Florida sits where it belongs: inside the empire it birthed. And should anyone take it from us, we shall do what we have always done.\n\nWe shall simply take it back."
 ate_florida_formables.0030.a:0 "West Florida answers to its rightful crown again."
 ate_florida_formables.0030.b:0 "The lone star was borrowed. Now it is returned."
