 # Waltney Shriner Neomoor decision
 ate_waltney_soflo_neomoor:0 "What Would Charles Think?"
 ate_waltney_soflo_neomoor_desc:0 "My ancestors died with the Imaginerian prayers on their lips and the mouse-ear on their brows. I buried them Imaginerian. And then I knelt toward Mecca.\n\nI told myself it was pragmatism. The Shriner faith was the faith of the south; better to ride the tide than drown in it. But I knew, even then, what I was doing. The [Root.GetDynastyName] family was built on Walt's dream — and I was the one who let it go.\n\nNow SoFlo is mine. And the Neomoor tide does not stop at faith. It asks for everything."
 ate_waltney_soflo_neomoor_tooltip:0 "Complete the transformation of the [Root.GetDynastyName] dynasty."
 ate_waltney_soflo_neomoor_confirm:0 "My ancestors would not recognize me. Perhaps that is the point."

 # ate_waltney.0001 — The Crescent Over the Magic Kingdom
 ate_waltney.0001.t:0 "What the Mouse Has Become"
 ate_waltney.0001.desc:0 "South Florida is ours. That should feel like victory.\n\nInstead I find myself in the portrait hall, looking at the faces of my ancestors — those who believed in Walt's dream, who kept the Imaginerian rites when half of Florida had already abandoned them, who carried the faith they inherited and trusted the next generation would do the same. They are strangers to me now. Or I am a stranger to them. I cannot tell anymore.\n\nI converted to the Shrine and called it politics. I told myself the [Root.GetDynastyName] name would survive the faith intact — that a dynasty is more than its prayers. Now the Neomoor culture spreads through every court and mosque in SoFlo, and my own children speak with its cadence. The transformation has already happened. All that remains is whether I will name it.\n\nTo declare it is to bury my ancestors twice. To refuse is to pretend the first burial did not happen."
 ate_waltney.0001.a:0 "Then let it be named. The [Root.GetDynastyName] family is Neomoor."
 ate_waltney.0001.b:0 "I am not ready to bury them twice."
 ate_waltney.0001.c:0 "The Mouse is dead. Long live Ababwa."

 # House Ababwa
 house_Ababwa:0 "Ababwa"
 house_waltney_ababwa_motto:0 "Shining, Shimmering, Splendid"
