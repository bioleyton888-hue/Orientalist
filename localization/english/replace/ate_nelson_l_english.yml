l_english:
 # Decision
 ate_nelson_soflo_neomoor:0 "Embrace the Neomoor Ways"
 ate_nelson_soflo_neomoor_desc:0 "For as long as the Nelsons have ruled Tampa, we have mingled with the native Sunshiners. The trade language gradually grew into everyday use. Today there is no distinction between us and them. We can no longer call ourselves by the old name — we are Neomoors, pure and simple."
 ate_nelson_soflo_neomoor_tooltip:0 "Reflect on Tampa's new identity as ruler of SoFlo."
 ate_nelson_soflo_neomoor_confirm:0 "We are Neomoor."

 # Decision Venus
 ate_venus_soflo_neomoor:0 "Embrace the Neomoor Ways"
 ate_venus_soflo_neomoor_desc:0 "After their embrace of Islam, the people of Miami began to incorporate more and more aspects of it into their culture, to a point where they may now be considered part of a distinct branch of South Anglo. They have begun to refer to themselves as Neomoors."
 ate_venus_soflo_neomoor_tooltip:0 "Reflect on Miami's new identity as rulers of SoFlo."
 ate_venus_soflo_neomoor_confirm:0 "Miami rises as Neomoor."

 # Event ate_nelson.0001
 ate_nelson.0001.t:0 "A New Name for Tampa"
 ate_nelson.0001.desc:0 "South Florida is mine. From its Sofloano quarters to its Shriner fezzes, this land is a testament to what Tampa could become — not merely Sunshiner, but something richer: a people forged from the Gulf coast and the Motowner diaspora alike. My sons look to me. Tampa looks to me. Shall the Nelsons be the first of the Neomoors?"
 ate_nelson.0001.a:0 "We are Neomoor. From this day forward."
 ate_nelson.0001.b:0 "The time is not yet right."

 # Event ate_nelson.0002
 ate_nelson.0002.t:0 "A New Name for Miami"
 ate_nelson.0002.desc:0 "South Florida is ours. From Archbold to the shores of Biscayne Bay, the Venus name carries weight — but culture is more than a name. The Neomoor spirit spreads from Tampa's shores, and Miami could be its second heartland. My children look to me. Shall the Venus family stand with the Nelsons as founders of this new people?"
 ate_nelson.0002.a:0 "Miami is Neomoor. The Venus family leads the way."
 ate_nelson.0002.b:0 "The time is not yet right."

 # Prince Ali Parade Chain — ate_nelson.0009-0013
 ate_nelson.0009.t:0 "A Treacherous Invitation"
 ate_nelson.0009.desc:0 "A courtier approaches you with a gleam in his eye, speaking of a majestic cave outside Tampa — filled to the brim with treasure and wonder. Foolishly, you set out with him. Indeed, the cave is present, but as you step foot inside, he lets out a laugh and says, #italic "Let the darkness unfold or find fortunes untold, servant of the Crescent!"# With a rumbling, the mouth of the cave collapses shut, trapping you within. This must be the work of Yakub himself — but you will not die in darkness."
 ate_nelson.0009.a:0 "I will find my way out. Yakub will not have me."

 ate_nelson.0010.t:0 "Make Way for Prince Ali"
 ate_nelson.0010.desc:0 "You are back in Tampa, free of the cave and the traitor who sealed it. There, along the sands by the water, a man introduces himself — Will Williams. He speaks with an energy that is hard to ignore, proposing a grand parade through Tampa to celebrate your rule and reinvigorate your people. With him stand a large assortment of your men, banners and drums at the ready. And is that... an elephant?"
 ate_nelson.0010.a:0 "Let us through — for it's a bright new star!"

 ate_nelson.0011.t:0 "Strong as Ten Regular Men"
 ate_nelson.0011.desc:0 "As your procession rides toward Tampa, a hundred bandits appear on the road, drawn by the spectacle of coin and color. They charge with confidence — but you make quick work of them, your men fighting with a ferocity that surprises even you. As the last bandit flees, your escort erupts in cheers. #italic "Mighty is he! Mighty is he!"#"
 ate_nelson.0011.a:0 "Strong as ten regular men? Definitely!"

 ate_nelson.0012.t:0 "The Bazaar"
 ate_nelson.0012.desc:0 "Your procession enters the great bazaar of Tampa. As you make your way through toward the palace, your men toss coins and goods into the air, and the crowd erupts in cheers. You catch the eye of a woman shopping at a stall — she turns to her companion and exclaims, #italic "That physique!"# Tampa has not seen a day like this in a long time."
 ate_nelson.0012.a:0 "Prince Ali, handsome is he!"

 ate_nelson.0013.t:0 "Prince Ali, Fabulous He"
 ate_nelson.0013.desc:0 "You finally arrive at the palace gates, the entire city buzzing with energy behind you. Will Williams bows deeply, his job done. The people of Tampa have a name on their lips tonight — and it is yours. Certainly, you have made a great name for yourself, if not for your entire city. Now, you can truly rule unshackled."
 ate_nelson.0013.a:0 "Make way for Prince Ali!"

 # Badroulbadour Chain — ate_nelson.0003-0008
 ate_nelson.0003.t:0 "A Captivating Dance"
 ate_nelson.0003.desc:0 "Word reaches you of a dancer performing in the market — a woman whose grace and artistry have drawn crowds from across the city. Curiosity gets the better of you, and you go to see for yourself. You find her mid-performance, moving with a beauty that seems to belong to another world entirely. When the music stops, she turns — and for a moment, her eyes meet yours."
 ate_nelson.0003.a:0 "I would love to speak with her further..."
 ate_nelson.0003.b:0 "I will not speak with this sinful dancer."

 ate_nelson.0004.t:0 "Wondrous Tales"
 ate_nelson.0004.desc:0 "Outside of the caravanserai, you meet with the dancer. She bows before you as she did in the market. You respond, #italic "Inform me of your name, oh Jasmine flower."# She smiles and then says, #italic "My father named me Badroulbadour — the fullest moon of full moons."# For hours, she regales you with fantastical tales of her journeys through courts all across the world. One of them is about a city named Chicago. It was once home to people of your faith — that of the true Islamic creed — but also home to apostates whose name belied their lack of respect for true Islamic tradition. Before she can continue, you both realize the sun is about to rise. You bid her farewell, but she grasps your arm. Her eyes dart to yours, and she asks #italic "My lord, will you meet me tomorrow? I have a matter which only you can save me from."#"
 ate_nelson.0004.a:0 "Meet me at my palace."

 ate_nelson.0005.t:0 "A Wish"
 ate_nelson.0005.desc:0 "You meet Badroulbadour on a terrace, overlooking the great port of the city. She looks back to you, smiles, then breaks down in tears. Composing herself, she apologizes before speaking. #italic "I did not finish the tale of Chicago..."# She begins telling you of the city's fall — the Great Infidel Invasion, the apostate uprising that came after, and the exodus of the faithful as the heart of Islam was made into a temple to their false god. Then, she pauses and takes a deep breath. #italic "Chicago was brought down by a wish, spurred on by Yakub and a misguided heart. A princess of the city wished to live as a normal girl. Her wish was granted, but Yakub works in devilish ways. The city her family had wisely governed for generations fell, her family sent into exile. She was a princess no more."#"
 ate_nelson.0005.a:0 "What a horrible story..."

 ate_nelson.0006.t:0 "A Curse"
 ate_nelson.0006.desc:0 "Badroulbadour takes a shuddering breath before continuing. #italic "That princess was my aunt Zumurrud, and the curse was passed down to me. I am doomed to die should I once more be called Princess. But for some reason, when I look upon you, I see the same wisdom and strength that once guided the rulers of Chicago. Perhaps you in your grace can help me break this curse..."# You look into her eyes. There are tears welling up as she speaks, but you see hope in them. You console her, remembering how your father had himself survived a sack led by the armies of Yakub. You rise, her hand in yours, and boldly proclaim your wish to vanquish Yakub and lift her curse. She smiles at this and wraps you in a warm embrace. You invite her back to your palace while you begin to think of ways to free her from the binding curse upon her family."
 ate_nelson.0006.a:0 "May Aladdin guide me!"

 ate_nelson.0007b.t:0 "A Difficult Choice"
 ate_nelson.0007b.desc:0 "Your heart burns for Badroulbadour, but your household is full. Islamic law grants you four wives, and all four seats are taken. If you are to marry Badroulbadour and lift her curse, one of your wives must be set free. This is not a choice you make lightly — but the heart wants what it wants."
 ate_nelson.0007b.a:0 "Part ways with [wife_1.GetFirstNameNoTooltip]"
 ate_nelson.0007b.b:0 "Part ways with [wife_2.GetFirstNameNoTooltip]"
 ate_nelson.0007b.c:0 "Part ways with [wife_3.GetFirstNameNoTooltip]"
 ate_nelson.0007b.d:0 "Part ways with [wife_4.GetFirstNameNoTooltip]"

 ate_nelson.0007.t:0 "To Break A Curse"
 ate_nelson.0007.desc:0 "You sit in your study, giving the curse on your friend Badroulbadour much thought. You think back to the stories in the Alcoran, remembering how dark djinns could be bested by even those of low rank with the use of wit and cleverness. Suddenly, you have an epiphany. You excitedly rush to Badroulbadour's quarters. She is surprised by your haste, but greets you warmly. You explain your theory. #italic "What if, instead of being a princess, you held an even higher rank? What if you were... a Queen? My queen? Would that not break the curse?"# To your surprise, she embraces you, thanking you for finding such a brilliant solution. #italic "And we needn't stay married long — we just have to break the curse, and then I will burden you no longer."# Your heart sinks at this, but you smile and play along, hoping for the best."
 ate_nelson.0007.a:0 "The marriage shall be swift to lift this curse!"
 ate_nelson.0007.b:0 "I... I am sorry. I cannot."

 ate_nelson.0008.t:0 "The Light of the Moon"
 ate_nelson.0008.desc:0 "Though she married you to lift the curse, Badroulbadour has been growing increasingly close to you. It is clear that the curse has been lifted, for she thrives more than ever. Every night, you intend to part from her, but every night she regales you with another story from her travels until you fall asleep without doing so. Tonight, she says she has a surprise for you. She guides you by hand to her terrace and has you sit and watch as she begins dancing for you in the style of the princesses of old. Then she gently kisses you. She tells you a final story — that of the King Shahryar and his wife, the fair Scheherezade — who narrated stories to survive until the object of her affection, the King, fell in love with her. She finishes by saying that just as Shahryar had fallen for Scheherezade, so too has she fallen for you."
 ate_nelson.0008.desc.gay:0 "The curse has lifted. Badroulbadour no longer carries the weight of Zumurrud's doom — you can see it in the way she laughs now, freely, without looking over her shoulder. The marriage was a formality, and she has always known it. Tonight she takes you to her terrace and dances for you in the style of the princesses of old. When she finishes, she does not kiss you. Instead she takes your hands in hers and says, #italic "I have traveled every court from Chicago to Tampa looking for something I could never name. I think I understand now — I was not searching for a love story. I was searching for someone who would face the dark with me."# You realize, with quiet certainty, that you were searching for the same."
 ate_nelson.0008.desc.asexual:0 "The curse has lifted. Badroulbadour dances for you in the style of the princesses of old, and it is beautiful — but not in the way she perhaps intended. You watch her and feel something you cannot quite name: warmth, admiration, a deep and quiet gratitude that has nothing to do with desire. When she finishes, she sees it in your face — the honest, unguarded expression of someone who cannot offer what she might have hoped for. To your surprise, she laughs softly. #italic \"I have told my stories to kings who wanted only a prize.\"# She takes your hands in hers. #italic \"You are the first who simply listened.\"#"
 ate_nelson.0008.a:0 "Another Arabian Night..."

 nick_fabulous_he_desc:0 "Prince Aliiii, fabulous heeee, Ali.....Nelson?...."

