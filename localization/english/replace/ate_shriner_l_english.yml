l_english:

 # Ya-Shamal nickname
 nick_ya_shamal:0 "Ya-Shamal"
 nick_ya_shamal_desc:0 "This character is revered as a champion of the Shriner faith and the greater Islamic world for fulfilling the prophesized reconquest of Chicago and ending the persecution of the Muslims therein."

 # Ya-Shamal Descendant trait
 trait_ya_shamal_descendant:0 "Ya-Shamal Descendant"
 trait_ya_shamal_descendant_desc:0 "This character is a descendant of Ya-Shamal, who fulfilled the prophesized reconquest of Chicago."
 trait_ya_shamal_descendant_character_desc:0 "[ROOT.GetCharacter.GetTitledFirstNameNoTooltip] is descended from Ya-Shamal, who fulfilled the prophesized reconquest of Chicago, and is regarded with esteem among the faithful of Islam."

 # Ya-Shamal trait
 trait_ya_shamal:0 "Ya-Shamal"
 trait_ya_shamal_desc:0 "This character is revered as a champion of the Shriner faith and the greater Islamic world for fulfilling the prophesized reconquest of Chicago and ending the persecution of the Muslims therein."
 trait_ya_shamal_character_desc:0 "[ROOT.GetCharacter.GetTitledFirstNameNoTooltip] is revered as a champion of the Shriner faith and the greater Islamic world for fulfilling the prophesized reconquest of Chicago and ending the persecution of the Muslims therein."

 # Ya-Shamal decision
 ya_shamal_decision:0 "Liberate Chicago"
 ya_shamal_decision_desc:0 "Chicago. The city of winds, the seat of the fallen House el-Shabazz, the wound that has festered in the heart of Islam for generations. The Alcoran speaks of a day when one of the faithful would ride into this city not as a pilgrim, but as its master — and the persecution of the believers would end not with prayer, but with conquest. That day is today. That conqueror is me. Let Yakub's heirs tremble."
 ya_shamal_decision_tooltip:0 "Liberate Chicago"
 ya_shamal_decision_confirm:0 "Let a new day commence."

 # ate_shriner.0003 — Seize the Imperial Divan
 ate_shriner.0003.t:0 "The Imperial Divan is Yours"
 ate_shriner.0003.desc:0 "The seat of the Imperial Divan has stood vacant of true authority for too long — passed between the weak and the unworthy while the faithful looked on. No longer. The weight of gold, the breadth of your realm, and the devotion of your people have spoken louder than any election. The Imperial Divan recognizes you. You are the Imperial Potentate."
 ate_shriner.0003.a:0 "The Divan has a master once more."

 # ate_shriner_imperial_potentate decision
 ate_shriner_imperial_potentate:0 "Seize the Imperial Divan"
 ate_shriner_imperial_potentate_desc:0 "The Imperial Divan — seat of the Imperial Potentate, head of the Shriner faith — belongs to whoever is strong enough to claim it. My realm and my coffers speak for themselves. The time has come to make my move."
 ate_shriner_imperial_potentate_tooltip:0 "Claim the title of Imperial Potentate"
 ate_shriner_imperial_potentate_confirm:0 "The Divan is mine."

 # Shriner Neomoor decision
 ate_shriner_soflo_neomoor:0 "Embrace the Neomoor Ways"
 ate_shriner_soflo_neomoor_desc:0 "After their embrace of Islam, the people of Miami began to incorporate more and more aspects of it into their culture, to a point where they may now be considered part of a distinct branch of South Anglo. They have begun to refer to themselves as Neomoors."
 ate_shriner_soflo_neomoor_tooltip:0 "Reflect on Miami's new identity as rulers of SoFlo."
 ate_shriner_soflo_neomoor_confirm:0 "Miami rises as Neomoor."

 # el-Shabaz dynasty
 dynn_caribe_el_shabaz:0 "el-Shabaz"

 # ate_shriner.0004 — Shriner Neomoor Identity Awakening
 ate_shriner.0004.t:0 "A New Name for Miami"
 ate_shriner.0004.desc:0 "South Florida is ours. From Archbold to the shores of Biscayne Bay, the [Root.GetDynastyName] name carries weight — but culture is more than a name. The Neomoor spirit spreads from Tampa's shores, and Miami could be its second heartland. My children look to me. Shall the [Root.GetDynastyName] family stand with the Nelsons as founders of this new people?"
 ate_shriner.0004.a:0 "Miami is Neomoor. The [Root.GetDynastyName] family leads the way."

 # ate_shriner.0001 — Ya-Shamal ceremony event
 ate_shriner.0001.t:0 "Liberate Chicago"
 ate_shriner.0001.desc:0 "All praise is due to the Greatest! Once more has Chicago been brought under the fold of the Islamic faithful, as [ROOT.GetTitledFirstNameNoTooltip] declares a month of celebration across the Shriner world in commemoration of the reconquest of the seat of House el-Shabazz. By virtue of this conquest, many have begun revering them as Ya-Shamal — also known as the Mahdi — the hero prophesied in the Alcoran and the Sunnah of the Prophet, who will honor them, their family, and their companions — the hero who will defeat Yakub and his works once and for all."
 ate_shriner.0001.a:0 "Badroulbadour's struggle was not for naught!"

# Badroulbadour Chain — ate_badroulbadour.0001-0006
 ate_badroulbadour.0001.t:0 "A Captivating Dance"
 ate_badroulbadour.0001.desc:0 "Word reaches you of a dancer performing in the market — a woman whose grace and artistry have drawn crowds from across the city. Curiosity gets the better of you, and you go to see for yourself. You find her mid-performance, moving with a beauty that seems to belong to another world entirely. When the music stops, she turns — and for a moment, her eyes meet yours."
 ate_badroulbadour.0001.a:0 "I would love to speak with her further..."
 ate_badroulbadour.0001.b:0 "I will not speak with this sinful dancer."

 ate_badroulbadour.0002.t:0 "Wondrous Tales"
 ate_badroulbadour.0002.desc:0 "Outside of the caravanserai, you meet with the dancer. She bows before you as she did in the market. You respond, #italic "Inform me of your name, oh Jasmine flower."# She smiles and then says, #italic "My father named me Badroulbadour — the fullest moon of full moons."# For hours, she regales you with fantastical tales of her journeys through courts all across the world. One of them is about a city named Chicago. It was once home to people of your faith — that of the true Islamic creed — but also home to apostates whose name belied their lack of respect for true Islamic tradition. Before she can continue, you both realize the sun is about to rise. You bid her farewell, but she grasps your arm. Her eyes dart to yours, and she asks #italic "My lord, will you meet me tomorrow? I have a matter which only you can save me from."#"
 ate_badroulbadour.0002.a:0 "Meet me at my palace."

 ate_badroulbadour.0003.t:0 "A Wish"
 ate_badroulbadour.0003.desc:0 "You meet Badroulbadour on a terrace, overlooking the great port of the city. She looks back to you, smiles, then breaks down in tears. Composing herself, she apologizes before speaking. #italic "I did not finish the tale of Chicago..."# She begins telling you of the city's fall — the Great Infidel Invasion, the apostate uprising that came after, and the exodus of the faithful as the heart of Islam was made into a temple to their false god. Then, she pauses and takes a deep breath. #italic "Chicago was brought down by a wish, spurred on by Yakub and a misguided heart. A princess of the city wished to live as a normal girl. Her wish was granted, but Yakub works in devilish ways. The city her family had wisely governed for generations fell, her family sent into exile. She was a princess no more."#"
 ate_badroulbadour.0003.a:0 "What a horrible story..."

 ate_badroulbadour.0004.t:0 "A Curse"
 ate_badroulbadour.0004.desc:0 "Badroulbadour takes a shuddering breath before continuing. #italic "That princess was my aunt Zumurrud, and the curse was passed down to me. I am doomed to die should I once more be called Princess. But for some reason, when I look upon you, I see the same wisdom and strength that once guided the rulers of Chicago. Perhaps you in your grace can help me break this curse..."# You look into her eyes. There are tears welling up as she speaks, but you see hope in them. You console her, remembering how your father had himself survived a sack led by the armies of Yakub. You rise, her hand in yours, and boldly proclaim your wish to vanquish Yakub and lift her curse. She smiles at this and wraps you in a warm embrace. You invite her back to your palace while you begin to think of ways to free her from the binding curse upon her family."
 ate_badroulbadour.0004.a:0 "May Aladdin guide me!"

 ate_badroulbadour.0005b.t:0 "A Difficult Choice"
 ate_badroulbadour.0005b.desc:0 "Your heart burns for Badroulbadour, but your household is full. Islamic law grants you four wives, and all four seats are taken. If you are to marry Badroulbadour and lift her curse, one of your wives must be set free. This is not a choice you make lightly — but the heart wants what it wants."
 ate_badroulbadour.0005b.a:0 "Part ways with [wife_1.GetFirstNameNoTooltip]"
 ate_badroulbadour.0005b.b:0 "Part ways with [wife_2.GetFirstNameNoTooltip]"
 ate_badroulbadour.0005b.c:0 "Part ways with [wife_3.GetFirstNameNoTooltip]"
 ate_badroulbadour.0005b.d:0 "Part ways with [wife_4.GetFirstNameNoTooltip]"
 ate_badroulbadour.0005b.e:0 "Sorry [betrothed_scope.GetFirstNameNoTooltip], it wasn't meant to be"

 ate_badroulbadour.0005.t:0 "To Break A Curse"
 ate_badroulbadour.0005.desc:0 "You sit in your study, giving the curse on your friend Badroulbadour much thought. You think back to the stories in the Alcoran, remembering how dark djinns could be bested by even those of low rank with the use of wit and cleverness. Suddenly, you have an epiphany. You excitedly rush to Badroulbadour's quarters. She is surprised by your haste, but greets you warmly. You explain your theory. #italic "What if, instead of being a princess, you held an even higher rank? What if you were... a Queen? My queen? Would that not break the curse?"# To your surprise, she embraces you, thanking you for finding such a brilliant solution. #italic "And we needn't stay married long — we just have to break the curse, and then I will burden you no longer."# Your heart sinks at this, but you smile and play along, hoping for the best."
 ate_badroulbadour.0005.a:0 "The marriage shall be swift to lift this curse!"
 ate_badroulbadour.0005.b:0 "I cannot let fairy tales get in the way of politics... sorry for wasting your time"
 ate_badroulbadour.0005.c:0 "Oh, you naive little morsel"

 ate_badroulbadour.0006.t:0 "The Light of the Moon"
 ate_badroulbadour.0006.desc:0 "Though she married you to lift the curse, Badroulbadour has been growing increasingly close to you. It is clear that the curse has been lifted, for she thrives more than ever. Every night, you intend to part from her, but every night she regales you with another story from her travels until you fall asleep without doing so. Tonight, she says she has a surprise for you. She guides you by hand to her terrace and has you sit and watch as she begins dancing for you in the style of the princesses of old. Then she gently kisses you. She tells you a final story — that of the King Shahryar and his wife, the fair Scheherezade — who narrated stories to survive until the object of her affection, the King, fell in love with her. She finishes by saying that just as Shahryar had fallen for Scheherezade, so too has she fallen for you."
 ate_badroulbadour.0006.desc.gay:0 "The curse has lifted. Badroulbadour no longer carries the weight of Zumurrud's doom — you can see it in the way she laughs now, freely, without looking over her shoulder. The marriage was a formality, and she has always known it. Tonight she takes you to her terrace and dances for you in the style of the princesses of old. When she finishes, she does not kiss you. Instead she takes your hands in hers and says, #italic "I have traveled every court from Chicago to Tampa looking for something I could never name. I think I understand now — I was not searching for a love story. I was searching for someone who would face the dark with me."# You realize, with quiet certainty, that you were searching for the same."
 ate_badroulbadour.0006.desc.asexual:0 "The curse has lifted. Badroulbadour dances for you in the style of the princesses of old, and it is beautiful — but not in the way she perhaps intended. You watch her and feel something you cannot quite name: warmth, admiration, a deep and quiet gratitude that has nothing to do with desire. When she finishes, she sees it in your face — the honest, unguarded expression of someone who cannot offer what she might have hoped for. To your surprise, she laughs softly. #italic \"I have told my stories to kings who wanted only a prize.\"# She takes your hands in hers. #italic \"You are the first who simply listened.\"#"
 ate_badroulbadour.0006.a:0 "Another Arabian Night..."

 ate_badroulbadour.0007.t:0 "A Thousand and One Nights"
 ate_badroulbadour.0007.desc:0 "The curse is lifted — Badroulbadour no longer carries the weight of Zumurrud’s doom, but she has realized the meat being consumed on this starless wedding night is more haram than the dirtiest of pigs. She just got out of the frying pan... into the fire. The gig is up, the farce is revealed. The marriage was a formality, and now she knows that you never looked at her with love or lust in your eyes — but with hunger. #italic “The main course was delicious, but I have room for dessert.”# You tell her with a psychotic grin from ear to ear as you grab your knife and draw closer. In a panicked state, she starts telling you the tale of a man who sailed the open sea on a barrel — it’s the only way she knows she can buy herself time. The tale is so interesting that by the time she is finished, you have lost your appetite; the main course has already gone to your stomach and you feel sated. And so, from this night on, you will go to her room to eat her, and each night she will tell you a story — a new one, without repetition — just to see the sun one more day. You can only fantasize about sinking your teeth into those juicy thighs, but you wait, you humor her, you will wait even a thousand and one nights, because you know...."
 ate_badroulbadour.0007.a:0 "She will run out of stories eventually."

 ate_captive_wife_opinion:0 "Captive Wife"


# Ibrahim the Mad chain — ate_shriner.0005-0008
 ate_shriner.0005.t:0 "A Sultan's Fancy"
 ate_shriner.0005.desc.lunatic:0 "[Root.GetFirstName] has been visited by a peculiar vision. He dreams of a great moon-woman — vast as the tides, warm as fresh bread, impossibly magnificent in her enormity. The voice of the Shrine rings clear: #italic seek her, and you shall know peace.#!"
 ate_shriner.0005.desc.possessed:0 "The djinn speaks again tonight, its voice curling through the palace corridors like incense smoke. #italic Find her,#! it hisses. #italic She exists, Sultan — vast and glorious, the largest woman in all the world. She is your destiny.#! [Root.GetFirstName] does not know if this is madness or prophecy."
 ate_shriner.0005.desc.deviant:0 "[Root.GetFirstName] has always known his tastes run... unconventional. The court pretends not to notice. But this latest fixation feels different — a conviction, deep and unshakeable, that the most magnificent woman in the world exists somewhere in this empire, and that she is very, very large. The search will begin at once."
 ate_shriner.0005.desc.rakish_seducer:0 "[Root.GetFirstName] has sampled widely, as his reputation confirms. But lately a peculiar preference has taken hold — away from the willowy and the delicate, toward something altogether more substantial. The largest woman in the empire, he has decided, would be the greatest conquest of his life. The agents must be dispatched immediately."
 ate_shriner.0005.desc.eccentric:0 "[Root.GetFirstName] has had, he freely admits, an unusual idea. He has seen cattle at market and horses at the fair, and has come to the firm conclusion that grandeur of form is the highest beauty. The search for the most magnificent woman in the empire must begin immediately."
 ate_shriner.0005.a:0 "Dispatch agents across the empire at once!"
 ate_shriner.0005.b:0 "I shall master these thoughts... for now."

 ate_shriner.0006.t:0 "The Agents Return"
 ate_shriner.0006.desc:0 "After months of searching, the agents return. They enter the throne room with care, followed by their remarkable find — a woman of extraordinary proportions, moving with the unhurried dignity of someone who has never once needed to hurry.\n\n#italic Her name is [sukkar.GetFirstName], my lord,#! announces the chief agent, barely concealing his bewilderment. #italic She comes from your own lands and is Shrine-faithful. She is... exactly as you requested.#!"
 ate_shriner.0006.a:0 "She is magnificent. Prepare her apartments at once."
 ate_shriner.0006.b:0 "What have I done... Send her away with a purse of gold."

 ate_shriner.0007.t:0 "Sugar Cube"
 ate_shriner.0007.desc:0 "[Root.GetFirstName] has taken to calling her #italic Sukkar#! — Sugar Cube — a name [sukkar.GetFirstName] seems to find quite pleasing. She is warm, endlessly laughing, and entirely at ease in her considerable presence. The court whispers. [Root.GetFirstName] does not hear them, or simply does not care.\n\nShe is, he has decided, exactly what he was looking for."
 ate_shriner.0007.a:0 "She will be my wife."
 ate_shriner.0007.c:0 "She will be my wife — and a Countess of this empire."
 ate_shriner.0007.b:0 "Let her be honored in my court. That is enough."

 ate_shriner.0008.t:0 "Only Ibrahim Can Judge Me"
 ate_shriner.0008.desc:0 "Word of [sukkar.GetFirstName] — the Sultan's new wife — has spread through court and beyond. The vassals are divided between amusement and outrage. The preachers cannot find clear scripture on the matter. [sukkar.GetFirstName] herself sits at [Root.GetFirstName]'s right hand at every feast, eating with great enthusiasm and laughing at everything."
 ate_shriner.0008.desc.countess:0 "Word of [sukkar.GetFirstName] — the Sultan's new wife and Countess — has spread through court and beyond. The vassals are in uproar. A woman who arrived in the throne room barely a month ago now holds a county of the realm. The preachers are very confused. [sukkar.GetFirstName] herself, a commoner who until recently had never set foot in a palace, stands frozen in the middle of the throne room with tears running down her face, laughing and crying at the same time, unable to believe any of this is real."
 ate_shriner.0008.a:0 "Let them say what they will. She has my full favor."
 ate_shriner.0008.b:0 "I will be... somewhat more discreet about this."
 ate_shriner.0008.c:0 "Freedom of speech you have — but freedom after speech, that I cannot guarantee."
