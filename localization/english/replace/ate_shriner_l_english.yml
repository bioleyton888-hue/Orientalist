 # Mawlid al-Fez trait
 trait_mawlid_al_fez:0 "Mawlid al-Fez"
 trait_mawlid_al_fez_desc:0 "This character was born while their parent held the title of Imperial Potentate, the sacred head of the Shriner faith."
 trait_mawlid_al_fez_character_desc:0 "[ROOT.GetCharacter.GetTitledFirstNameNoTooltip] was born to the Imperial Potentate and carries the blessing of the Shrine from birth."

 # D-Mecca holy site
 holy_site_detroit_shriner_effect_name:0 "D-Mecca"

 # Ya-Shamal nickname
 nick_ya_shamal:0 "Ya-Shamal"
 nick_ya_shamal_desc:0 "This character is revered as a champion of the Shriner faith and the greater Islamic world for fulfilling the prophesized reconquest of Detroit and ending the persecution of the Muslims therein."

 # Ya-Shamal Descendant trait
 trait_ya_shamal_descendant:0 "Ya-Shamal Descendant"
 trait_ya_shamal_descendant_desc:0 "This character is a descendant of Ya-Shamal, who fulfilled the prophesized reconquest of Detroit."
 trait_ya_shamal_descendant_character_desc:0 "[ROOT.GetCharacter.GetTitledFirstNameNoTooltip] is descended from Ya-Shamal, who fulfilled the prophesized reconquest of Detroit, and is regarded with esteem among the faithful of Islam."

 # Ya-Shamal trait
 trait_ya_shamal:0 "Ya-Shamal"
 trait_ya_shamal_desc:0 "This character is revered as a champion of the Shriner faith and the greater Islamic world for fulfilling the prophesized reconquest of Detroit and ending the persecution of the Muslims therein."
 trait_ya_shamal_character_desc:0 "[ROOT.GetCharacter.GetTitledFirstNameNoTooltip] is revered as a champion of the Shriner faith and the greater Islamic world for fulfilling the prophesized reconquest of Detroit and ending the persecution of the Muslims therein."

 # Ya-Shamal decision
 ya_shamal_decision:0 "Liberate Detroit"
 ya_shamal_decision_desc:0 "Detroit. The city of winds, the seat of the fallen House el-Shabazz, the wound that has festered in the heart of Islam for generations. The Alcoran speaks of a day when one of the faithful would ride into this city not as a pilgrim, but as its master — and the persecution of the believers would end not with prayer, but with conquest. That day is today. That conqueror is me. Let Yakub's heirs tremble."
 ya_shamal_decision_tooltip:0 "Liberate Detroit"
 ya_shamal_decision_confirm:0 "Let a new day commence."

 # ate_shriner.0003 — Seize the Imperial Divan
 ate_shriner.0003.t:0 "The Imperial Divan is Yours"
 ate_shriner.0003.desc:0 "The seat of the Imperial Divan has stood vacant of true authority for too long — passed between the weak and the unworthy while the faithful looked on. No longer. The weight of gold, the breadth of your realm, and the devotion of your people have spoken louder than any election. The Imperial Divan recognizes you. You are the Imperial Potentate."
 ate_shriner.0003.a:0 "The Divan has a master once more."

 # ate_shriner_imperial_potentate decision
 ate_shriner_imperial_potentate:0 "Seize the Imperial Divan"
 ate_shriner_imperial_potentate_desc:0 "The Imperial Divan — seat of the Imperial Potentate, head of the Shriner faith — belongs to whoever is strong enough to claim it. My realm and my coffers speak for themselves. The time has come to make my move."
 ate_shriner_imperial_potentate_tooltip:0 "Claim the title of Imperial Potentate"
 ate_shriner_imperial_potentate_confirm:0 "The Divan is mine."

 # Shriner Neomoor decision
 ate_shriner_soflo_neomoor:0 "Embrace the Neomoor Ways"
 ate_shriner_soflo_neomoor_desc:0 "After their embrace of Islam, the people of Miami began to incorporate more and more aspects of it into their culture, to a point where they may now be considered part of a distinct branch of South Anglo. They have begun to refer to themselves as Neomoors."
 ate_shriner_soflo_neomoor_tooltip:0 "Reflect on Miami's new identity as rulers of SoFlo."
 ate_shriner_soflo_neomoor_confirm:0 "Miami rises as Neomoor."

 # el-Shabaz dynasty
 dynn_caribe_el_shabaz:0 "el-Shabaz"

 # ate_shriner.0004 — Shriner Neomoor Identity Awakening
 ate_shriner.0004.t:0 "A New Name for Miami"
 ate_shriner.0004.desc:0 "South Florida is ours. From Archbold to the shores of Biscayne Bay, the [Root.GetDynastyName] name carries weight — but culture is more than a name. The Neomoor spirit spreads from Tampa's shores, and Miami could be its second heartland. My children look to me. Shall the [Root.GetDynastyName] family stand with the Nelsons as founders of this new people?"
 ate_shriner.0004.a:0 "Miami is Neomoor. The [Root.GetDynastyName] family leads the way."

 # ate_shriner.0001 — Ya-Shamal ceremony event
 ate_shriner.0001.t:0 "Liberate Detroit"
 ate_shriner.0001.desc:0 "All praise is due to the Greatest! Once more has Detroit been brought under the fold of the Islamic faithful, as [ROOT.GetTitledFirstNameNoTooltip] declares a month of celebration across the Shriner world in commemoration of the reconquest of the seat of House el-Shabazz. By virtue of this conquest, many have begun revering them as Ya-Shamal — also known as the Mahdi — the hero prophesied in the Alcoran and the Sunnah of the Prophet, who will honor them, their family, and their companions — the hero who will defeat Yakub and his works once and for all."
 ate_shriner.0001.a:0 "Badroulbadour's struggle was not for naught!"

# Badroulbadour Chain — ate_badroulbadour.0001-0006
 ate_badroulbadour.0001.t:0 "A Captivating Dance"
 ate_badroulbadour.0001.desc:0 "Word reaches you of a dancer performing in the market — a woman whose grace and artistry have drawn crowds from across the city. Curiosity gets the better of you, and you go to see for yourself. You find her mid-performance, moving with a beauty that seems to belong to another world entirely. When the music stops, she turns — and for a moment, her eyes meet yours."
 ate_badroulbadour.0001.a:0 "I would love to speak with her further..."
 ate_badroulbadour.0001.b:0 "I will not speak with this sinful dancer."

 ate_badroulbadour.0002.t:0 "Wondrous Tales"
 ate_badroulbadour.0002.desc:0 "Outside of the caravanserai, you meet with the dancer. She bows before you as she did in the market. You respond, #italic "Inform me of your name, oh Jasmine flower."# She smiles and then says, #italic "My father named me Badroulbadour — the fullest moon of full moons."# For hours, she regales you with fantastical tales of her journeys through courts all across the world. One of them is about a city named Detroit. It was once home to people of your faith — that of the true Islamic creed — but also home to apostates whose name belied their lack of respect for true Islamic tradition. Before she can continue, you both realize the sun is about to rise. You bid her farewell, but she grasps your arm. Her eyes dart to yours, and she asks #italic "My lord, will you meet me tomorrow? I have a matter which only you can save me from."#"
 ate_badroulbadour.0002.a:0 "Meet me at my palace."

 ate_badroulbadour.0003.t:0 "A Wish"
 ate_badroulbadour.0003.desc:0 "You meet Badroulbadour on a terrace, overlooking the great port of the city. She looks back to you, smiles, then breaks down in tears. Composing herself, she apologizes before speaking. #italic "I did not finish the tale of Detroit..."# She begins telling you of the city's fall — the Great Infidel Invasion, the apostate uprising that came after, and the exodus of the faithful as the heart of Islam was made into a temple to their false god. Then, she pauses and takes a deep breath. #italic "Detroit was brought down by a wish, spurred on by Yakub and a misguided heart. A princess of the city wished to live as a normal girl. Her wish was granted, but Yakub works in devilish ways. The city her family had wisely governed for generations fell, her family sent into exile. She was a princess no more."#"
 ate_badroulbadour.0003.a:0 "What a horrible story..."

 ate_badroulbadour.0004.t:0 "A Curse"
 ate_badroulbadour.0004.desc:0 "Badroulbadour takes a shuddering breath before continuing. #italic "That princess was my aunt Zumurrud, and the curse was passed down to me. I am doomed to die should I once more be called Princess. But for some reason, when I look upon you, I see the same wisdom and strength that once guided the rulers of Detroit. Perhaps you in your grace can help me break this curse..."# You look into her eyes. There are tears welling up as she speaks, but you see hope in them. You console her, remembering how your father had himself survived a sack led by the armies of Yakub. You rise, her hand in yours, and boldly proclaim your wish to vanquish Yakub and lift her curse. She smiles at this and wraps you in a warm embrace. You invite her back to your palace while you begin to think of ways to free her from the binding curse upon her family."
 ate_badroulbadour.0004.a:0 "May Aladdin guide me!"

 ate_badroulbadour.0005b.t:0 "A Difficult Choice"
 ate_badroulbadour.0005b.desc:0 "Your heart burns for Badroulbadour, but your household is full. Islamic law grants you four wives, and all four seats are taken. If you are to marry Badroulbadour and lift her curse, one of your wives must be set free. This is not a choice you make lightly — but the heart wants what it wants."
 ate_badroulbadour.0005b.a:0 "Part ways with [wife_1.GetFirstNameNoTooltip]"
 ate_badroulbadour.0005b.b:0 "Part ways with [wife_2.GetFirstNameNoTooltip]"
 ate_badroulbadour.0005b.c:0 "Part ways with [wife_3.GetFirstNameNoTooltip]"
 ate_badroulbadour.0005b.d:0 "Part ways with [wife_4.GetFirstNameNoTooltip]"
 ate_badroulbadour.0005b.e:0 "Sorry [betrothed_scope.GetFirstNameNoTooltip], it wasn't meant to be"

 ate_badroulbadour.0005.t:0 "To Break A Curse"
 ate_badroulbadour.0005.desc:0 "You sit in your study, giving the curse on your friend Badroulbadour much thought. You think back to the stories in the Alcoran, remembering how dark djinns could be bested by even those of low rank with the use of wit and cleverness. Suddenly, you have an epiphany. You excitedly rush to Badroulbadour's quarters. She is surprised by your haste, but greets you warmly. You explain your theory. #italic "What if, instead of being a princess, you held an even higher rank? What if you were... a Queen? My queen? Would that not break the curse?"# To your surprise, she embraces you, thanking you for finding such a brilliant solution. #italic "And we needn't stay married long — we just have to break the curse, and then I will burden you no longer."# Your heart sinks at this, but you smile and play along, hoping for the best."
 ate_badroulbadour.0005.a:0 "The marriage shall be swift to lift this curse!"
 ate_badroulbadour.0005.b:0 "I cannot let fairy tales get in the way of politics... sorry for wasting your time"
 ate_badroulbadour.0005.c:0 "Oh, you naive little morsel"

 ate_badroulbadour.0006.t:0 "The Light of the Moon"
 ate_badroulbadour.0006.desc:0 "Though she married you to lift the curse, Badroulbadour has been growing increasingly close to you. It is clear that the curse has been lifted, for she thrives more than ever. Every night, you intend to part from her, but every night she regales you with another story from her travels until you fall asleep without doing so. Tonight, she says she has a surprise for you. She guides you by hand to her terrace and has you sit and watch as she begins dancing for you in the style of the princesses of old. Then she gently kisses you. She tells you a final story — that of the King Shahryar and his wife, the fair Scheherezade — who narrated stories to survive until the object of her affection, the King, fell in love with her. She finishes by saying that just as Shahryar had fallen for Scheherezade, so too has she fallen for you."
 ate_badroulbadour.0006.desc.gay:0 "The curse has lifted. Badroulbadour no longer carries the weight of Zumurrud's doom — you can see it in the way she laughs now, freely, without looking over her shoulder. The marriage was a formality, and she has always known it. Tonight she takes you to her terrace and dances for you in the style of the princesses of old. When she finishes, she does not kiss you. Instead she takes your hands in hers and says, #italic "I have traveled every court from Detroit to Tampa looking for something I could never name. I think I understand now — I was not searching for a love story. I was searching for someone who would face the dark with me."# You realize, with quiet certainty, that you were searching for the same."
 ate_badroulbadour.0006.desc.asexual:0 "The curse has lifted. Badroulbadour dances for you in the style of the princesses of old, and it is beautiful — but not in the way she perhaps intended. You watch her and feel something you cannot quite name: warmth, admiration, a deep and quiet gratitude that has nothing to do with desire. When she finishes, she sees it in your face — the honest, unguarded expression of someone who cannot offer what she might have hoped for. To your surprise, she laughs softly. #italic \"I have told my stories to kings who wanted only a prize.\"# She takes your hands in hers. #italic \"You are the first who simply listened.\"#"
 ate_badroulbadour.0006.a:0 "Another Arabian Night..."

 ate_badroulbadour.0007.t:0 "A Thousand and One Nights"
 ate_badroulbadour.0007.desc:0 "The curse is lifted — Badroulbadour no longer carries the weight of Zumurrud’s doom, but she has realized the meat being consumed on this starless wedding night is more haram than the dirtiest of pigs. She just got out of the frying pan... into the fire. The gig is up, the farce is revealed. The marriage was a formality, and now she knows that you never looked at her with love or lust in your eyes — but with hunger. #italic “The main course was delicious, but I have room for dessert.”# You tell her with a psychotic grin from ear to ear as you grab your knife and draw closer. In a panicked state, she starts telling you the tale of a man who sailed the open sea on a barrel — it’s the only way she knows she can buy herself time. The tale is so interesting that by the time she is finished, you have lost your appetite; the main course has already gone to your stomach and you feel sated. And so, from this night on, you will go to her room to eat her, and each night she will tell you a story — a new one, without repetition — just to see the sun one more day. You can only fantasize about sinking your teeth into those juicy thighs, but you wait, you humor her, you will wait even a thousand and one nights, because you know...."
 ate_badroulbadour.0007.a:0 "She will run out of stories eventually."

 ate_captive_wife_opinion:0 "Captive Wife"


# Ibrahim the Mad chain — ate_shriner.0005-0008
 ate_shriner.0005.t:0 "A Sultan's Fancy"
 ate_shriner.0005.desc.lunatic:0 "[Root.GetFirstNameNoTooltip] has been visited by a peculiar vision. He dreams of a great moon-woman — vast as the tides, warm as fresh bread, impossibly magnificent in her enormity. The voice of the Shrine rings clear: #italic seek her, and you shall know peace.#!"
 ate_shriner.0005.desc.possessed:0 "The djinn speaks again tonight, its voice curling through the palace corridors like incense smoke. #italic Find her,#! it hisses. #italic She exists, Sultan — vast and glorious, the largest woman in all the world. She is your destiny.#! [Root.GetFirstNameNoTooltip] does not know if this is madness or prophecy."
 ate_shriner.0005.desc.deviant:0 "[Root.GetFirstNameNoTooltip] has always known his tastes run... unconventional. The court pretends not to notice. But this latest fixation feels different — a conviction, deep and unshakeable, that the most magnificent woman in the world exists somewhere in this empire, and that she is very, very large. The search will begin at once."
 ate_shriner.0005.desc.rakish_seducer:0 "[Root.GetFirstNameNoTooltip] has sampled widely, as his reputation confirms. But lately a peculiar preference has taken hold — away from the willowy and the delicate, toward something altogether more substantial. The largest woman in the empire, he has decided, would be the greatest conquest of his life. The agents must be dispatched immediately."
 ate_shriner.0005.desc.eccentric:0 "[Root.GetFirstNameNoTooltip] has had, he freely admits, an unusual idea. He has seen cattle at market and horses at the fair, and has come to the firm conclusion that grandeur of form is the highest beauty. The search for the most magnificent woman in the empire must begin immediately."
 ate_shriner.0005.a:0 "Dispatch agents across the empire at once!"
 ate_shriner.0005.b:0 "I shall master these thoughts... for now."

 ate_shriner.0006.t:0 "The Agents Return"
 ate_shriner.0006.desc:0 "After months of searching, the agents return. They enter the throne room with care, followed by their remarkable find — a woman of extraordinary proportions, moving with the unhurried dignity of someone who has never once needed to hurry.\n\n#italic Her name is [sukkar.GetFirstNameNoTooltip], my lord,#! announces the chief agent, barely concealing his bewilderment. #italic She comes from your own lands and is Shrine-faithful. She is... exactly as you requested.#!"
 ate_shriner.0006.a:0 "She is magnificent. Prepare her apartments at once."
 ate_shriner.0006.b:0 "What have I done... Send her away with a purse of gold."

 ate_shriner.0007.t:0 "Sugar Cube"
 ate_shriner.0007.desc:0 "[Root.GetFirstNameNoTooltip] has taken to calling her #italic Sukkar#! — Sugar Cube — a name [sukkar.GetFirstNameNoTooltip] seems to find quite pleasing. She is warm, endlessly laughing, and entirely at ease in her considerable presence. The court whispers. [Root.GetFirstNameNoTooltip] does not hear them, or simply does not care.\n\nShe is, he has decided, exactly what he was looking for."
 ate_shriner.0007.a:0 "She will be my wife."
 ate_shriner.0007.c:0 "She will be my wife — and a Countess of this empire."
 ate_shriner.0007.b:0 "Let her be honored in my court. That is enough."

 ate_shriner.0008.t:0 "Only Ibrahim Can Judge Me"
 ate_shriner.0008.desc:0 "Word of [sukkar.GetFirstNameNoTooltip] — the Sultan's new wife — has spread through court and beyond. The vassals are divided between amusement and outrage. The preachers cannot find clear scripture on the matter. [sukkar.GetFirstNameNoTooltip] herself sits at [Root.GetFirstNameNoTooltip]'s right hand at every feast, eating with great enthusiasm and laughing at everything."
 ate_shriner.0008.desc.countess:0 "Word of [sukkar.GetFirstNameNoTooltip] — the Sultan's new wife and Countess — has spread through court and beyond. The vassals are in uproar. A woman who arrived in the throne room barely a month ago now holds a county of the realm. The preachers are very confused. [sukkar.GetFirstNameNoTooltip] herself, a commoner who until recently had never set foot in a palace, stands frozen in the middle of the throne room with tears running down her face, laughing and crying at the same time, unable to believe any of this is real."
 ate_shriner.0008.a:0 "Let them say what they will. She has my full favor."
 ate_shriner.0008.b:0 "I will be... somewhat more discreet about this."
 ate_shriner.0008.c:0 "Freedom of speech you have — but freedom after speech, that I cannot guarantee."

 # ate_shriner.0010 — The Sacred Breakfast
 ate_shriner.0010.t:0 "The Sacred Breakfast"
 ate_shriner.0010.desc:0 "Every year, on the morning of the Feast of the Lodge, the Shriners throw open the doors of the temple and feed anyone who comes. The poor, the curious, the devout, and the merely hungry — all are welcome. The recipe is ancient and unchanged: batter, griddle, heat. The ceremony that surrounds it is not.\n\nThe Imperial Potentate has sent word. The faithful are expected to do their part. The griddles are hot. The line stretches around the block."
 ate_shriner.0010.a:0 "Spare no expense. Every soul in my lands eats today."
 ate_shriner.0010.b:0 "A modest table is still a table. Prepare what we can."
 ate_shriner.0010.c:0 "Let the Lodge find another patron this year."
 ate_shriner.0010.d:0 "Maple syrup for everybody. ...Yes, that is how syrup tastes. Do not question it."
 ate_shriner.0010.e:0 "Maple syrup for everybody. I have made a personal contribution to the recipe. Very personal."
 ate_shriner.0010.f:0 "Taste my new pancake recipe. Woodstock style."

 # ate_shriner.0011 — The Cafecito
 ate_shriner.0011.t:0 "The Cafecito"
 ate_shriner.0011.desc:0 "[barista.GetFirstNameNoTooltip] arrives before dawn with a tray bearing two cups the size of thimbles and a steel pot so small it seems impractical for any serious purpose. The coffee inside is black and impossibly thick — the old Sofloano way, brewed low and slow and beaten into something closer to mud than drink.\n\n[barista.GetFirstNameNoTooltip] sets the cups down with both hands, the formal two-handed gesture of the Lodge, murmurs a blessing in the old tongue, and waits. The room smells of cardamom and dark roast. Neither of you speaks. Two worlds in one cup."
 ate_shriner.0011.a:0 "I drink it as it was made. Both traditions honor the same God."
 ate_shriner.0011.b:0 "The ceremony must be correct. I show [barista.GetFirstNameNoTooltip] the proper form."
 ate_shriner.0011.c:0 "Pour me another cup. I want to know what [barista.GetFirstNameNoTooltip] knows."
 ate_shriner.0011.d:0 "Say, you know we are the original inventors of coffee, do you?"
 ate_coffee_lecture_opinion:0 "Insufferable Coffee Lecture"

 # ate_shriner.0012-0014 — A Mummy on the Loose
 ate_ramses_vassal_opinion_tt:0 "Your vassals will think less of you for tolerating this. #bad -20#!"
 ate_shriner.0012.t:0 "A Mummy on the Loose"
 ate_shriner.0012.desc:0 "Reports have reached your court from the countryside — the kind that travel fast, carried by men who trip over their own feet in the telling. A mummy, they say. Walking. Moving through the fields at night and leaving nothing but panic in its wake. Your priests are divided on whether this is a miracle, a curse, or the work of Yakub. Your soldiers are divided on nothing: they are simply frightened."
 ate_shriner.0012.a:0 "Ready my horse. I will handle this personally."
 ate_shriner.0012.b:0 "Let the countryside tell its stories. I have a realm to run."

 ate_shriner.0013.t:0 "Not a Mummy"
 ate_shriner.0013.desc:0 "Your soldiers found him. An old man — wrapped head to toe in dirty linen, flesh bearing the long marks of illness, living alone in a cave at the edge of your county. He does not speak much. He does not threaten anyone. He is barely mobile.\n\nThe peasants have not changed their minds. The soldiers are not entirely sure theirs have changed either. They are all waiting for you to tell them what they found.\n\nYou are not certain you want to."
 ate_shriner.0013.a:0 "This man is not a mummy. Bring him to court. The Lodge feeds those it cannot heal."
 ate_shriner.0013.b:0 "This man is not a mummy. Give him medicine and supplies. Leave him in peace."
 ate_shriner.0013.c:0 "This man is not a mummy. Send him away. This cannot happen again."
 ate_shriner.0013.d:0 "A man who has survived this long alone is worth having. Come."
 ate_shriner.0013.e:0 "Say nothing. Sit with him a while. He already knows."
 ate_shriner.0013.f:0 "No mummy. No problem."
 ate_shriner.0013.g:0 "Ancient one. I know what you are. Teach me."

 ate_shriner.0014.t:0 "Ramses"
 ate_shriner.0014.desc:0 "The trail leads to a cemetery at the edge of the county. The fog sits low and dense between the headstones, the kind that swallows sound. Your retinue slows. The horses do not want to go further.\n\nThen he steps out of it.\n\nHe is wrapped head to toe in ceremonial linen, layered over armor, deliberate as a coronation robe. His flesh bears the long marks of a life spent at the edge of death. He carries himself like a man who has already died once and found it beneath him. He stops ten paces from you, and the fog stirs.\n\nThey rise from the ground around you — or seem to. His followers, emerging from between the graves, from behind the stones, from the mist itself. Lepers, every one of them. Cast out from every village, every court, every home that turned them away. Dozens. Perhaps more. You cannot see where the fog ends and the army begins.\n\nThe silence holds for a single breath.\n\nThen he #italic speaks#!.\n\nHis voice carries across the entire cemetery — not to you, to #italic everyone#!, to the fog and the graves and the army rising from them. He declares that his name is Ramses. That he has died and been reborn. That the age of Pharaohs has returned to these lands and that its throne belongs to him by divine right. He is not addressing you so much as #italic announcing#! himself — to the world, to the dead, to God himself if God is listening. His arms are raised. His followers answer with a sound that is half cheer, half wail.\n\nThen his eyes find yours. He points.\n\nYou do not have time to think."
 ate_shriner.0014.a:0 "Chaaaaaaaaarge."
 ate_shriner.0014.b:0 "He is giving you a grave to die in. I am offering you a place to live. The Lodge will take you in. Every last one of you. Put down your arms."
 ate_shriner.0014.c:0 "Swear to me. I'll give you land, gold, and a real war to fight."
 ate_shriner.0014.d:0 "Archers. Fire."
 ate_shriner.0014.e:0 "THE DEAD WALK AMONG US. RUN, YOU FOOLS."
 ate_shriner.0014.f:0 "Pharaoh. Fine. A tenth of your tribute to my treasury. We understand each other."
 ate_shriner.0014.g:0 "You are surrounded. Surrender or suffer."
 ate_shriner.0014.h:0 "There is a genie that can cure what you carry. Come with me. Bring them all."
 ate_shriner.0014.i:0 "I am the real Ramses, by right of birth. Dispose of this charlatan."

 ate_ramses_terror_modifier:0 "Ramses' Terror"
 ate_ramses_terror_modifier_desc:0 "The self-declared Pharaoh's army has moved through these lands, and the people have not forgotten. Fear keeps the harvest low and the purse closed."
 ate_ramses_tolerated_opinion:0 "Lord Tolerates the Mummy"
 ate_pharaoh_curse_modifier:0 "Pharaoh's Curse"
 ate_pharaoh_curse_modifier_desc:0 "To defy the Pharaoh is to court something ancient and unpleasant. The ailments that follow feel less like illness and more like a promise."
 ate_pharaoh_blessing_modifier:0 "Pharaoh's Blessing"
 ate_pharaoh_blessing_modifier_desc:0 "The Pharaoh's favor is worth something — at least in coin. The trade routes that cross his domain do so at his pleasure."
 ate_leper_patron_modifier:0 "Patron of the Afflicted"
 ate_leper_patron_modifier_desc:0 "The Lodge does not turn away the sick, and neither does this ruler. The people remember."
 dynn_ramsesovich:0 "Ramsesovich"
 house_ramsesovich:0 "Ramsesovich"
 dynn_ramsesovich_motto:0 "I Have Died and Found It Beneath Me"
 ate_pharaoh_bane_modifier:0 "Pharaoh's Bane"
 ate_pharaoh_bane_modifier_desc:0 "Ramses is dead, and something of his power lingers in the one who struck him down. The old gods take notice of those who kill their Pharaoh."
 ate_mummylord_modifier:0 "Mummylord"
 ate_mummylord_modifier_desc:0 "Followed by a retinue of lepper bodyguards this lord is both feared and loved by his people"

 # Mummy chain toasts — 0013
 ate_shriner.0013.a.toast:0 "The old man follows you home without a word."
 ate_shriner.0013.b.toast:0 "He is still alive. He will continue to be. That is enough."
 ate_shriner.0013.c.toast:0 "He is gone before morning. The rumor outlasts him."
 ate_shriner.0013.d.toast:0 "He does not object. You wonder if he expected this."
 ate_shriner.0013.e.toast:0 "No words are necessary. You sit together until the light changes."
 ate_shriner.0013.f.toast:0 "The soldiers bury him quickly. The story will take longer."
 ate_shriner.0013.g.toast:0 "He answers every question. You are not entirely sure you believe him."

 # Mummy chain toasts — 0014
 ate_shriner.0014.a.win.toast:0 "Ramses falls. The fog clears."
 ate_shriner.0014.a.loss.toast:0 "Ramses does not fall. You do, nearly. The Pharaoh's Curse has begun."
 ate_shriner.0014.b.toast:0 "The lepers lay down their weapons. Ramses watches them go from the fog."
 ate_shriner.0014.c.fail.toast:0 "Ramses is not convinced. He teaches you this personally."
 ate_shriner.0014.c.partial.toast:0 "He takes the oath, grudgingly. He is now yours. Somewhat."
 ate_shriner.0014.c.clean.toast:0 "He swears without hesitation. You are unsure whether to be relieved or worried."
 ate_shriner.0014.d.fail.toast:0 "The ambush collapses. Ramses was ready."
 ate_shriner.0014.d.messy.toast:0 "Ramses dies in the confusion. No one claims credit."
 ate_shriner.0014.d.clean.toast:0 "Clean and quiet. The Pharaoh is no more."
 ate_shriner.0014.e.toast:0 "Your legs were faster. Your reputation was not."
 ate_shriner.0014.f.toast:0 "A deal struck in a cemetery, sealed in silence."
 ate_shriner.0014.g.toast:0 "Ramses surrenders without a fight. He seems, somehow, unsurprised."
 ate_shriner.0014.h.toast:0 "Ramses nods once. The army lowers its arms."
 ate_shriner.0014.i.toast:0 "His men do not stop you. They had questions about the divine right."

 ate_shriner_oil_lamp_modifier:0 "Lamp of the Shrine"
 ate_shriner_oil_lamp_modifier_desc:0 "The lamp asks nothing and reveals everything. A genie's gift, held and never squandered."

 # ate_shriner.0009 — A Lamp in the Bazaar
 ate_shriner.0009.t:0 "A Lamp in the Bazaar"
 ate_shriner.0009.desc:0 "A merchant has appeared in the Tampa bazaar, drawing crowds from every corner of the city. In his hands — wrapped in silk, as though the cloth itself might burst into flame — he holds a battered copper lamp. He claims to have found it in the ruins of a great northern city, half-buried beneath rubble that has not been touched in a generation. He is rubbing it. Nothing is happening. But the crowd watches with the intensity of the devout, and more join by the minute."
 ate_shriner.0009.a:0 "Have the Lodge examine it. If a genie dwells within, let the faithful be the first to know."
 ate_shriner.0009.b:0 "Buy it. If a genie dwells within, I will be the one to ask the wish."
 ate_shriner.0009.c:0 "Drive him from the city. We already have enough charlatans here."

 # ate_shriner_initiated_modifier
 ate_shriner_initiated_modifier:0 "Initiated Shriner"
 ate_shriner_initiated_modifier_desc:0 "Received the fez from his father's hands before manhood. He has sworn the oaths of the Lodge and crossed the threshold."

 # ate_shriner_fez_initiation decision
 ate_shriner_fez_initiation:0 "Present the Fez"
 ate_shriner_fez_initiation_desc:0 "A boy does not become a Shriner on his own. A father must call his son before the Lodge, place the fez upon his head, and speak the oaths aloud. It is not a long ceremony. It does not need to be. The boy who enters the hall is not the same one who leaves it."
 ate_shriner_fez_initiation_tooltip:0 "Initiate your son into the Lodge before he comes of age"
 ate_shriner_fez_initiation_confirm:0 "The Lodge awaits."

 # ate_shriner.0015 — The Ceremony of the Fez
 ate_shriner.0015.t:0 "The Ceremony of the Fez"
 ate_shriner.0015.desc:0 "The hall of the Lodge is quiet when [Root.GetFirstNameNoTooltip] calls [son.GetFirstNameNoTooltip] forward. The boy stands straight — he has been practicing. The fez is placed in his hands. The words of the Lodge are spoken. And then it is done. [son.GetFirstNameNoTooltip] turns it over in his hands — crimson felt, black tassel, the same as every other — and something passes across his face that has no name. He puts it on. It is slightly too large. He does not take it off."
 ate_shriner.0015.a:0 "The Lodge is yours now, [son.GetFirstNameNoTooltip]. Guard it well."
 ate_shriner.0015.b:0 "Let every brother of the Lodge bear witness to this."
 ate_shriner.0015.b.toast:0 "[son.GetFirstNameNoTooltip] has received the fez. He is a Shriner."
