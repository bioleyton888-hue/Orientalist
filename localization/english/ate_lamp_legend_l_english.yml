l_english:
 # The Lamp of Agrabah — chronicle prose
 # The founding myth of the Shriner faith, told Scheherazade-style over five nights:
 # the Aladdin tale fused with the life of the Prophet, set in post-Event Florida.
 legend_chronicle_ate_lamp_of_agrabah: "The Lamp of Agrabah"
 legend_chronicle_ate_lamp_of_agrabah_desc: "Told over five nights in the manner of the old tales: how the orphan Aladdin, beloved of Supreme Allah, drew the Word from a buried lamp and raised the Order of the Mystic Shrine out of the drowned ruins of Florida. Every teller adds a night of their own — and [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] claims the blood-right to finish the story."
 legend_chapter_ate_lamp_rubble_bazaar: "On the first night it is told: in the rubble bazaars of Agrabah, where the drowned towers lean over the orange groves, there lived an orphan called Aladdin. A street rat, say the unkind; al-Amin, the Trustworthy, say the merchants who weighed his word against gold and found the word heavier. He owned nothing but a fez and his honesty — and Supreme Allah watches longest over those who own least."
 legend_chapter_ate_lamp_vault_of_wonders: "On the second night it is told: a sorcerer from the far Maghreb led the boy beneath the swamp, into a vault glittering with the treasures of the antediluvian world, and bade him fetch only a battered copper lamp. Sealed in the dark, Aladdin rubbed the lamp for light — and the Genie rose in smoke and fire and spoke a single command: RECITE. The orphan, who could not read, recited. Forty nights he remained while the Genie taught, and what he carried out of the earth was not treasure, but the Word."
 legend_chapter_ate_lamp_hand_of_badroulbadour: "On the third night it is told: the princess Badroulbadour heard the orphan preach barefoot in the bazaar and believed before any other soul in Agrabah. She gave him her hand while the idol-priests laughed, and her fortune when they stopped laughing — first of the believers, mother of the faithful. A wife who believes, say the tellers, is worth more than a genie's three wishes; and Aladdin, blessed twice over, had both."
 legend_chapter_ate_lamp_new_lamps_for_old: "On the fourth night it is told: the sorcerer returned to the city crying 'new lamps for old!', and the foolish of Agrabah traded truth away for polish. The idol-priests seized the gates, and the faithful were driven out. With a fez, a lamp, and a handful of believers, Aladdin crossed the palmetto flats to Tampa — the Hijra of the Gulf, the tellers call it — and there, between hurricane and tide, the Order of the Mystic Shrine was founded in exile."
 legend_chapter_ate_lamp_reclamation: "On the fifth night it is told: Aladdin returned to Agrabah with ten thousand of the faithful and took the city without burning a single grove. The idols were broken, the sorcerer's lamps were melted down for the poor-box, and with his final wish Aladdin set the Genie free — for charity is the last word of the Word. From the shrine he raised, the Imperial Divan reigns still; and by lamp and blood alike its light descends to [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip], [ROOT.Legend.GetProtagonist.GetHerHis] claim to [ROOT.Legend.GetProperty( 'title' ).Title.GetBaseNameNoTooltip] written in fire on the first page of the tale."
